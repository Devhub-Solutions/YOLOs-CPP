name: Multi-OS Binary Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            extension: ""
            ort_asset: onnxruntime-linux-x64-1.20.1.tgz
          - os: windows-latest
            artifact_name: win-x64
            extension: ".exe"
            ort_asset: onnxruntime-win-x64-1.20.1.zip
          - os: macos-latest
            artifact_name: macos-arm64
            extension: ""
            ort_asset: onnxruntime-osx-arm64-1.20.1.tgz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev build-essential cmake curl

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Install OpenCV via Chocolatey
          choco install opencv -y
          # Find OpenCV installation path and set OpenCV_DIR
          $opencvPath = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib" -Filter "opencv.*" | Select-Object -ExpandProperty FullName | Sort-Object -Descending | Select-Object -First 1
          if ($opencvPath) {
            $opencvBuildPath = Join-Path $opencvPath "tools\opencv\build"
            echo "OpenCV_DIR=$opencvBuildPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "OpenCV_DIR set to: $opencvBuildPath"
          } else {
            Write-Error "OpenCV installation not found via Chocolatey."
            exit 1
          }

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install opencv cmake

      - name: Download ONNX Runtime
        shell: bash
        run: |
          ORT_VERSION="1.20.1"
          URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${{ matrix.ort_asset }}"
          curl -L -o ort_archive "${URL}"
          if [[ "${{ matrix.ort_asset }}" == *.zip ]]; then
            unzip ort_archive -d ort_extracted
          else
            mkdir -p ort_extracted
            tar -xzf ort_archive -C ort_extracted --strip-components=1
          fi
          # Find the actual directory name if unzipped (for Windows)
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ORT_DIR=$(ls -d ort_extracted/onnxruntime-win-x64-*)
            echo "ONNXRUNTIME_DIR=$GITHUB_WORKSPACE/$ORT_DIR" >> $GITHUB_ENV
          else
            echo "ONNXRUNTIME_DIR=$GITHUB_WORKSPACE/ort_extracted" >> $GITHUB_ENV
          fi

      - name: Configure and Build
        shell: bash
        run: |
          mkdir build && cd build
          cmake .. -DONNXRUNTIME_DIR="${ONNXRUNTIME_DIR}" -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel

      - name: Prepare Binaries
        shell: bash
        run: |
          mkdir -p release_binaries/${{ matrix.artifact_name }}
          # Determine build output directory
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BUILD_OUT="build/Release"
          else
            BUILD_OUT="build"
          fi
          
          # List of executables to collect
          EXES=("image_inference" "video_inference" "camera_inference" "class_image_inference" "batch_image_inference")
          
          for exe in "${EXES[@]}"; do
            if [ -f "${BUILD_OUT}/${exe}${{ matrix.extension }}" ]; then
              cp "${BUILD_OUT}/${exe}${{ matrix.extension }}" "release_binaries/${{ matrix.artifact_name }}/"
            fi
          done
          
          # Copy ONNX Runtime shared libraries
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "${ONNXRUNTIME_DIR}/lib/onnxruntime.dll" "release_binaries/${{ matrix.artifact_name }}/"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            cp "${ONNXRUNTIME_DIR}/lib/libonnxruntime.so"* "release_binaries/${{ matrix.artifact_name }}/"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp "${ONNXRUNTIME_DIR}/lib/libonnxruntime."*.dylib "release_binaries/${{ matrix.artifact_name }}/"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_name }}
          path: release_binaries/

  commit-binaries:
    name: Commit Binaries to Branch
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_binaries

      - name: Prepare release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create or switch to 'binaries' branch
          if git rev-parse --verify origin/binaries >/dev/null 2>&1; then
            git checkout binaries
          else
            git checkout --orphan binaries
            git rm -rf .
          fi
          
          # Copy binaries to organized folders
          mkdir -p bin
          cp -r all_binaries/binaries-*/* bin/
          
          # Add a README for the branch
          echo "# Project Binaries" > README.md
          echo "This branch contains pre-built binaries for multiple operating systems." >> README.md
          echo "Generated by GitHub Actions at $(date)" >> README.md
          
          git add .
          git commit -m "chore: update binaries for all platforms [skip ci]" || echo "No changes to commit"
          git push origin binaries --force
