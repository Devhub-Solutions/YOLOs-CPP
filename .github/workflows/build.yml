name: Multi-OS Binary Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            extension: ""
            ort_asset: onnxruntime-linux-x64-1.20.1.tgz
          - os: windows-latest
            artifact_name: win-x64
            extension: ".exe"
            ort_asset: onnxruntime-win-x64-1.20.1.zip
          - os: macos-latest
            artifact_name: macos-arm64
            extension: ""
            ort_asset: onnxruntime-osx-arm64-1.20.1.tgz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Dependencies ────────────────────────────────────────────────────────

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev build-essential cmake curl zip

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install opencv -y --no-progress

          $candidates = @(
            "C:\tools\opencv\build",
            "C:\opencv\build"
          )

          $found = $candidates | Where-Object { Test-Path "$_\OpenCVConfig.cmake" } | Select-Object -First 1

          if (-not $found) {
            Write-Host "Falling back to recursive search for OpenCVConfig.cmake..."
            $found = Get-ChildItem -Path "C:\" -Recurse -Filter "OpenCVConfig.cmake" -ErrorAction SilentlyContinue |
                     Select-Object -First 1 |
                     ForEach-Object { $_.DirectoryName }
          }

          if ($found) {
            echo "OpenCV_DIR=$found" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "OpenCV_DIR set to: $found"
          } else {
            Write-Error "Could not find OpenCVConfig.cmake. OpenCV may not have installed correctly."
            exit 1
          }

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install opencv cmake

      # ─── ONNX Runtime ────────────────────────────────────────────────────────

      - name: Download ONNX Runtime
        shell: bash
        run: |
          ORT_VERSION="1.20.1"
          URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${{ matrix.ort_asset }}"
          curl -L -o ort_archive "${URL}"

          if [[ "${{ matrix.ort_asset }}" == *.zip ]]; then
            unzip ort_archive -d ort_extracted
            ORT_SUBDIR=$(ls -d ort_extracted/onnxruntime-win-x64-* 2>/dev/null | head -1)
            if [[ -n "$ORT_SUBDIR" ]]; then
              echo "ONNXRUNTIME_DIR=$GITHUB_WORKSPACE/$ORT_SUBDIR" >> $GITHUB_ENV
            else
              echo "ONNXRUNTIME_DIR=$GITHUB_WORKSPACE/ort_extracted" >> $GITHUB_ENV
            fi
          else
            mkdir -p ort_extracted
            tar -xzf ort_archive -C ort_extracted --strip-components=1
            echo "ONNXRUNTIME_DIR=$GITHUB_WORKSPACE/ort_extracted" >> $GITHUB_ENV
          fi

      # ─── Build ───────────────────────────────────────────────────────────────

      - name: Configure and Build
        shell: bash
        run: |
          mkdir build && cd build

          CMAKE_ARGS="-DONNXRUNTIME_DIR=${ONNXRUNTIME_DIR} -DCMAKE_BUILD_TYPE=Release"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            CMAKE_ARGS="$CMAKE_ARGS -DOpenCV_DIR=${OpenCV_DIR}"
          fi

          cmake .. $CMAKE_ARGS
          cmake --build . --config Release --parallel

      # ─── Prepare Binaries ────────────────────────────────────────────────────

      - name: Prepare Binaries
        shell: bash
        run: |
          mkdir -p release_binaries/${{ matrix.artifact_name }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BUILD_OUT="build/Release"
          else
            BUILD_OUT="build"
          fi

          EXES=("image_inference" "video_inference" "camera_inference" "class_image_inference" "batch_image_inference")

          for exe in "${EXES[@]}"; do
            if [ -f "${BUILD_OUT}/${exe}${{ matrix.extension }}" ]; then
              cp "${BUILD_OUT}/${exe}${{ matrix.extension }}" "release_binaries/${{ matrix.artifact_name }}/"
            fi
          done

          # Copy ONNX Runtime shared libraries
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "${ONNXRUNTIME_DIR}/lib/onnxruntime.dll" "release_binaries/${{ matrix.artifact_name }}/"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            cp "${ONNXRUNTIME_DIR}/lib/libonnxruntime.so"* "release_binaries/${{ matrix.artifact_name }}/"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp "${ONNXRUNTIME_DIR}/lib/libonnxruntime."*.dylib "release_binaries/${{ matrix.artifact_name }}/"
          fi

      # ─── Package ─────────────────────────────────────────────────────────────

      - name: Package Binaries
        shell: bash
        run: |
          cd release_binaries/${{ matrix.artifact_name }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            zip -r ../../sdk-${{ matrix.artifact_name }}.zip .
          else
            tar -czf ../../sdk-${{ matrix.artifact_name }}.tar.gz .
          fi

      # ─── Checksum ────────────────────────────────────────────────────────────

      - name: Generate Checksum
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            sha256sum sdk-${{ matrix.artifact_name }}.zip > sdk-${{ matrix.artifact_name }}.sha256
          else
            sha256sum sdk-${{ matrix.artifact_name }}.tar.gz > sdk-${{ matrix.artifact_name }}.sha256
          fi

      # ─── Upload Artifact ─────────────────────────────────────────────────────

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-${{ matrix.artifact_name }}
          path: |
            sdk-${{ matrix.artifact_name }}.*

  # ─── Release ─────────────────────────────────────────────────────────────────

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version tag
        run: |
          VERSION=v$(date +'%Y.%m.%d.%H%M')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Merge checksums
        run: |
          find artifacts -name "*.sha256" -exec cat {} \; > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            ## 🚀 Release ${{ env.VERSION }}

            Automatically built from `main` branch.

            ### Assets
            | File | Platform |
            |------|----------|
            | `sdk-linux-x64.tar.gz` | Linux x64 |
            | `sdk-win-x64.zip` | Windows x64 |
            | `sdk-macos-arm64.tar.gz` | macOS ARM64 |

            ### SDK Auto-Update
            Fetch latest release via API:
            ```
            GET https://api.github.com/repos/${{ github.repository }}/releases/latest
            ```
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            checksums.txt
